name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest
    env:
      PACK_OUTPUT: ./artifacts/release-pack
    permissions:
      id-token: write   # Required for OIDC token issuance
      contents: write   # Required for uploading release assets
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version-without-v=$VERSION" >> $GITHUB_OUTPUT
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release /p:ContinuousIntegrationBuild=true /p:Version="${{ steps.get_version.outputs.version-without-v }}"
      - name: Pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$PACK_OUTPUT"

          timeout --preserve-status 15m dotnet pack Kontent.Ai.Delivery.sln \
            --no-build \
            --include-symbols \
            --configuration Release \
            --output "$PACK_OUTPUT" \
            /p:ContinuousIntegrationBuild=true \
            /p:PackageVersion="${{ steps.get_version.outputs.version-without-v }}" \
            /bl:"$PACK_OUTPUT/release-pack.binlog"
      - name: Validate package artifacts
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.get_version.outputs.version-without-v }}"
          expected_nupkgs=(
            "Kontent.Ai.Delivery.${VERSION}.nupkg"
            "Kontent.Ai.Delivery.Abstractions.${VERSION}.nupkg"
            "Kontent.Ai.Delivery.Caching.${VERSION}.nupkg"
            "Kontent.Ai.Urls.${VERSION}.nupkg"
            "Kontent.Ai.Delivery.SourceGeneration.${VERSION}.nupkg"
          )

          # Source generator package embeds PDBs and does not require a snupkg.
          expected_snupkgs=(
            "Kontent.Ai.Delivery.${VERSION}.snupkg"
            "Kontent.Ai.Delivery.Abstractions.${VERSION}.snupkg"
            "Kontent.Ai.Delivery.Caching.${VERSION}.snupkg"
            "Kontent.Ai.Urls.${VERSION}.snupkg"
          )

          missing=0

          for package in "${expected_nupkgs[@]}"; do
            if [ ! -f "${PACK_OUTPUT}/${package}" ]; then
              echo "Missing expected package: ${package}"
              missing=1
            fi
          done

          for package in "${expected_snupkgs[@]}"; do
            if [ ! -f "${PACK_OUTPUT}/${package}" ]; then
              echo "Missing expected symbol package: ${package}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            echo "Release pack validation failed. Available artifacts:"
            ls -la "$PACK_OUTPUT"
            exit 1
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "NuGet packages"
          path: |
            ./artifacts/release-pack/*.nupkg
            ./artifacts/release-pack/*.snupkg
            ./artifacts/release-pack/release-pack.binlog
          if-no-files-found: error
      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Publish artifacts to NuGet.org
        run: dotnet nuget push "${PACK_OUTPUT}/*.nupkg" -s https://api.nuget.org/v3/index.json -k ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate
      - name: Upload artifacts to the GitHub release
        run: gh release upload "$GITHUB_REF_NAME" ${PACK_OUTPUT}/*.nupkg ${PACK_OUTPUT}/*.snupkg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
