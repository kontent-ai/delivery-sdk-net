name: Build & Test

on:
  push:
    branches: [ master, vnext, vNext ]
  pull_request:
    branches: [ master, vnext, vNext ]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore
    - name: Lint Release Docs
      if: runner.os == 'Linux'
      run: ./scripts/lint-release-docs.sh
    - name: Build
      run: dotnet build --no-restore /p:ContinuousIntegrationBuild=true
    - name: Test
      run: dotnet test --no-build --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:Threshold=70 /p:ThresholdType=line /p:ThresholdStat=total
    - name: Restore local tools
      if: runner.os == 'Linux'
      run: dotnet tool restore
    - name: Run Slopwatch
      if: runner.os == 'Linux'
      run: dotnet slopwatch analyze -d . --fail-on warning
    - name: Codecov
      if: runner.os == 'Linux'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true

  redis-validation:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore /p:ContinuousIntegrationBuild=true
    - name: Redis integration tests
      run: dotnet test Kontent.Ai.Delivery.Tests/Kontent.Ai.Delivery.Tests.csproj --no-build --configuration Debug --filter "FullyQualifiedName~RedisCacheIntegrationTests"
      env:
        KONTENT_SDK_RUN_REDIS_TESTS: "true"
        KONTENT_SDK_REDIS_CONNECTION: "localhost:6379"
