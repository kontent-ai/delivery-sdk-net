name: Build & Test

on:
  push:
    branches: [ master, vnext, vNext ]
  pull_request:
    branches: [ master, vnext, vNext ]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore /p:ContinuousIntegrationBuild=true
    - name: Test
      run: dotnet test --no-build --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:Threshold=70 /p:ThresholdType=line /p:ThresholdStat=total
    - name: Restore local tools
      if: runner.os == 'Linux'
      run: dotnet tool restore
    - name: Run Slopwatch
      if: runner.os == 'Linux'
      run: dotnet slopwatch analyze -d . --fail-on warning
    - name: Codecov
      if: runner.os == 'Linux'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true

  pack-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PACKAGE_VERSION: 0.0.0-ci.${{ github.run_number }}
      PACK_OUTPUT: ./artifacts/pack-validation
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore /p:ContinuousIntegrationBuild=true
    - name: Pack release artifacts
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$PACK_OUTPUT"

        timeout --preserve-status 15m dotnet pack Kontent.Ai.Delivery.sln \
          --no-build \
          --configuration Release \
          --include-symbols \
          --output "$PACK_OUTPUT" \
          /p:ContinuousIntegrationBuild=true \
          /p:PackageVersion="$PACKAGE_VERSION" \
          /bl:"$PACK_OUTPUT/pack-validation.binlog"
    - name: Validate package artifacts
      shell: bash
      run: |
        set -euo pipefail

        expected_nupkgs=(
          "Kontent.Ai.Delivery.${PACKAGE_VERSION}.nupkg"
          "Kontent.Ai.Delivery.Abstractions.${PACKAGE_VERSION}.nupkg"
          "Kontent.Ai.Delivery.Caching.${PACKAGE_VERSION}.nupkg"
          "Kontent.Ai.Urls.${PACKAGE_VERSION}.nupkg"
          "Kontent.Ai.Delivery.SourceGeneration.${PACKAGE_VERSION}.nupkg"
        )

        # Source generator package embeds PDBs and does not require a snupkg.
        expected_snupkgs=(
          "Kontent.Ai.Delivery.${PACKAGE_VERSION}.snupkg"
          "Kontent.Ai.Delivery.Abstractions.${PACKAGE_VERSION}.snupkg"
          "Kontent.Ai.Delivery.Caching.${PACKAGE_VERSION}.snupkg"
          "Kontent.Ai.Urls.${PACKAGE_VERSION}.snupkg"
        )

        missing=0

        for package in "${expected_nupkgs[@]}"; do
          if [ ! -f "${PACK_OUTPUT}/${package}" ]; then
            echo "Missing expected package: ${package}"
            missing=1
          fi
        done

        for package in "${expected_snupkgs[@]}"; do
          if [ ! -f "${PACK_OUTPUT}/${package}" ]; then
            echo "Missing expected symbol package: ${package}"
            missing=1
          fi
        done

        if [ "${missing}" -ne 0 ]; then
          echo "Pack validation failed. Available artifacts:"
          ls -la "$PACK_OUTPUT"
          exit 1
        fi
    - name: Upload pack validation artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pack-validation-artifacts
        path: |
          ./artifacts/pack-validation/*.nupkg
          ./artifacts/pack-validation/*.snupkg
          ./artifacts/pack-validation/pack-validation.binlog
        if-no-files-found: warn

  redis-validation:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore /p:ContinuousIntegrationBuild=true
    - name: Redis integration tests
      run: dotnet test Kontent.Ai.Delivery.Tests/Kontent.Ai.Delivery.Tests.csproj --no-build --configuration Debug --filter "FullyQualifiedName~RedisCacheIntegrationTests"
      env:
        KONTENT_SDK_RUN_REDIS_TESTS: "true"
        KONTENT_SDK_REDIS_CONNECTION: "localhost:6379"
